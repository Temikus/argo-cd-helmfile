# Multi-arch image build published to GHCR.
#
# Policy: always pin, never floating.
#  - Every action is pinned to a commit SHA (the trailing `# vX.Y.Z` is just a human hint).
#  - Published image tags are immutable: per-commit `sha-<full-sha>` and, on a release tag
#    push, the git tag itself. No `:latest` / `:master` / branch tags are produced.

name: CI

on:
  push:
    branches:
      - master
      - next
    tags:
      - "v*"
  pull_request:
    branches:
      - master

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/temikus/argo-cd-helmfile

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          # No floating tags: latest=false disables the implicit :latest tag.
          flavor: |
            latest=false
          tags: |
            type=sha,format=long,prefix=sha-
            type=ref,event=tag
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
